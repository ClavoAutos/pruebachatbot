<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba de Bot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .page-header {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 32px 20px;
    }

    .page-body {
      text-align: center;
      padding: 40px 20px;
    }

    #aless-chat > iframe {
      border-radius: 16px;
      display: block;
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 255px;
      height: 95px;
      max-height: 100%;
      opacity: 1;
      color-scheme: none;
      background: transparent;
      margin: 0px;
      max-width: 100vw;
      transform: translateY(0px);
      transition: none 0s ease 0s !important;
      visibility: visible;
      z-index: 999999999 !important;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="page-header">
    <h1>Prueba de Bot</h1>
    <p>Entorno de prueba para integración del chatbot</p>
  </div>

  <div class="page-body">
    <h2>Panel de prueba</h2>
    <p>Aquí puedes probar el comportamiento del bot integrado.</p>
  </div>

  <div id="aless-chat">
    <iframe src="mycredimedia_client.html" frameborder="0"></iframe>
  </div>
</body>

</html>
